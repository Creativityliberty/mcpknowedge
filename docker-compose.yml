services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  app:
    build: .
    restart: unless-stopped
    depends_on:
      - qdrant
    ports:
      - "8000:8000"
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      PUBLIC_BASE_URL: http://localhost:8000
      DATA_DIR: /app/data
      DATABASE_PATH: /app/data/registry.sqlite3
      UPLOAD_DIR: /app/data/uploads
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: numtema_private_knowledge
      OLLAMA_URL: http://host.docker.internal:11434
      EMBEDDING_MODEL: nomic-embed-text-v2-moe
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - app_data:/app/data

volumes:
  qdrant_data:
  app_data:
